{% load static %}
<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <title>Nyaki AFH Admin</title>
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <meta content="adult family home Seattle, adult family home Auburn WA, assisted living Seattle Washington, senior care Auburn Washington, dementia care Seattle, Alzheimer’s care Auburn WA, residential care facility Seattle WA, elderly care home Auburn WA, long term care Seattle, 24 hour senior care Auburn Washington, private care home Seattle, AFH Auburn WA, senior housing Seattle Washington, memory care Auburn WA, compassionate senior care Seattle and Auburn Washington"
          name="keywords">
    <meta content="Nyaki Adult Family Home provides compassionate, 24-hour personalized senior care in Seattle and Auburn, Washington. Specializing in assisted living and dementia care in a safe, comfortable home environment. Schedule a tour today."
          name="description">

    <!-- Favicon -->
    <link href="{% static 'img/favicon.ico' %}" rel="icon">

    <!-- Google Web Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:opsz,wght@6..144,1..1000&family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
          rel="stylesheet">    <!-- Icon Font Stylesheet -->
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.10.0/css/all.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.4.1/font/bootstrap-icons.css" rel="stylesheet">

    <!-- Libraries Stylesheet -->
    <link href="{% static 'lib/animate/animate.min.css' %}" rel="stylesheet">
    <link href="{% static 'lib/owlcarousel/assets/owl.carousel.min.css' %}" rel="stylesheet">

    <!-- Customized Bootstrap Stylesheet -->
    <link href="{% static 'css/bootstrap.min.css' %}" rel="stylesheet">

    <!-- Template Stylesheet -->
    <link href="{% static 'css/style.css' %}" rel="stylesheet">
    {% block head %}
    {% endblock head %}
</head>

<body>
<!-- Spinner Start -->
<div id="spinner"
     class="show bg-white position-fixed translate-middle w-100 vh-100 top-50 start-50 d-flex align-items-center justify-content-center">
    <div class="spinner-border text-primary" role="status"></div>
</div>
<!-- Spinner End -->


<!-- Navbar Start -->
<div class="container-fluid fixed-top px-0 wow fadeIn" data-wow-delay="0.1s">
    <nav class="navbar navbar-expand-lg navbar-light py-lg-0 px-lg-5 wow fadeIn" data-wow-delay="0.1s">
        <a href="{% url 'admin' %}" class="navbar-brand ms-4 ms-lg-0">
            <h1 class="fw-bold text-primary m-0">
                <img style="max-height: 36px!important;padding:0!important;margin:0!important" class="  border-0"
                     src="{% static 'img/logo/logo-symbol.png' %}">
            </h1>
        </a>
        <button type="button" class="navbar-toggler me-4" data-bs-toggle="collapse" data-bs-target="#navbarCollapse">
            <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarCollapse">
            <div class="navbar-nav ms-auto p-4 p-lg-0">
                <a href="{% url 'forest_ridge' %}" class="nav-item nav-link ">Forest Ridge</a>
                <a href="{% url 'rstreet' %}" class="nav-item nav-link ">R Street</a>
                <a href="{% url 'activities' %}" class="nav-item nav-link ">Activities</a>
            </div>
        </div>
    </nav>
</div>
<!-- Navbar End -->
{% block content %}
{% endblock %}


<!-- Back to Top -->
<a href="#" class="btn btn-lg btn-primary btn-lg-square rounded-circle back-to-top"><i class="bi bi-arrow-up"></i></a>


<!-- JavaScript Libraries -->
<script src="https://code.jquery.com/jquery-3.4.1.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="{% static 'lib/wow/wow.min.js' %}"></script>
<script src="{% static 'lib/easing/easing.min.js' %}"></script>
<script src="{% static 'lib/waypoints/waypoints.min.js' %}"></script>
<script src="{% static 'lib/owlcarousel/owl.carousel.min.js' %}"></script>
<script src="https://unpkg.com/cropperjs@2.1.1/dist/cropper.min.js"></script>

<!-- Template Javascript -->
<script src="{% static 'js/main.js' %}"></script>
{% block scripts %}
{% endblock scripts %}
</body>

</html>
