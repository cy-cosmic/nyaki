{% extends 'admin/base.html' %}
{% block head %}
    <style>
        #previewModal .modal-dialog {
            height: 90vh;
            max-height: 90vh;
            margin: 0 auto;
        }

        #previewModal .modal-content {
            height: 90vh;
            border-radius: 0;
        }

        #previewModal .modal-body {
            overflow: hidden;
        }

        .preview-img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
        }

        .gallery-img-wrapper {
            width: 100%;
            height: 260px; /* same height for all images */
            border-radius: 10px;
            overflow: hidden;
        }

        .gallery-img {
            width: 100%;
            height: 100%;
            object-fit: cover; /* fills box, crops excess */
        }
    </style>
{% endblock %}
{% block content %}

    <!-- Feature Start -->
    <div class="container-fluid bg-white  my-5 py-6 min-vh-100" id="services">
        <div class="container">
            <div class="row g-0 gx-5 align-items-end mb-4">
                <div class="col-lg-6">
                    <h5 class="mb-3">Forest Ridge Photos</h5>
                </div>
                <div class="col-lg-6 text-start text-lg-end wow slideInRight" data-wow-delay="0.1s"
                     style="visibility: visible; animation-delay: 0.1s; animation-name: slideInRight;">
                    <div>
                        <button id="uploadBtn" class="btn btn-primary rounded-pill px-4"><i class="fa fa-plus"></i>
                            Upload
                        </button>
                        <input type="file" id="fileInput" hidden accept="image/*">
                    </div>
                </div>
            </div>

            <div class="row g-4 align-items-stretch">
                {% for photo in photos %}
                    <div class="col-xl-3 col-lg-4 col-md-6">
                        <div class="gallery-img-wrapper shadow">
                            <img class="gallery-img" src="{{ photo.image.url }}" alt="">
                        </div>
                        <div class="d-flex justify-content-center p-3">
                            <button data-url="{% url 'delete_forest' photo.id %}"
                                    class="btn btn-sm text-danger delete-btn"><i
                                    class="fa fa-trash-alt fa-lg "></i></button>
                        </div>
                    </div>
                {% endfor %}
            </div>
        </div>
    </div>
    <!-- Feature End -->
    <div class="modal fade" id="previewModal" tabindex="-1">
        <div class="modal-dialog modal-lg modal-dialog-centered modal-fullscreen-sm-down">
            <div class="modal-content h-100 bg-icon border-0">
                <div class="modal-body d-flex justify-content-center align-items-center p-0">
                    <img id="previewImage" class="img-fluid preview-img">
                </div>
                <div class="modal-footer border-0 d-flex justify-content-evenly">
                    <button class="btn btn-secondary rounded-pill px-4" data-bs-dismiss="modal">Cancel</button>
                    <button class="btn btn-primary rounded-pill px-4" id="uploadConfirmBtn">Upload</button>
                </div>

            </div>
        </div>
    </div>
{% endblock %}
{% block scripts %}
    <script>
        const fileInput = document.getElementById("fileInput");
        const uploadBtn = document.getElementById("uploadBtn");
        const previewImage = document.getElementById("previewImage");

        let selectedFile = null;

        uploadBtn.addEventListener("click", () => {
            fileInput.click();
        });

        fileInput.addEventListener("change", (e) => {
            selectedFile = e.target.files[0];

            const reader = new FileReader();
            reader.onload = function (event) {
                previewImage.src = event.target.result;

                const modal = new bootstrap.Modal(document.getElementById("previewModal"));
                modal.show();
            };

            reader.readAsDataURL(selectedFile);
        });

        document.getElementById("uploadConfirmBtn").addEventListener("click", () => {
            const formData = new FormData();
            formData.append("image", selectedFile);

            fetch("{% url 'forest_ridge' %}", {
                method: "POST",
                body: formData,
                headers: {
                    "X-CSRFToken": getCookie("csrftoken")
                }
            }).then(() => location.reload());
        });

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie && document.cookie !== '') {
                const cookies = document.cookie.split(';');
                for (let cookie of cookies) {
                    cookie = cookie.trim();
                    if (cookie.startsWith(name + '=')) {
                        cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                        break;
                    }
                }
            }
            return cookieValue;
        }
    </script>
    <script>
        document.querySelectorAll(".delete-btn").forEach(btn => {
            btn.addEventListener("click", function () {

                const url = this.dataset.url;

                if (!confirm("Delete this image?")) return;

                fetch(url, {
                    method: "POST",
                    headers: {
                        "X-CSRFToken": getCookie("csrftoken")
                    }
                })
                    .then(res => res.json())
                    .then(data => {
                        if (data.success) {
                            location.reload();
                        }
                    });

            });
        });

        function getCookie(name) {
            let cookieValue = null;
            if (document.cookie) {
                document.cookie.split(";").forEach(c => {
                    c = c.trim();
                    if (c.startsWith(name + "=")) {
                        cookieValue = decodeURIComponent(c.slice(name.length + 1));
                    }
                });
            }
            return cookieValue;
        }
    </script>
{% endblock %}
